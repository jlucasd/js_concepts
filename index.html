<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprendendo JS</title>
    <style>
        body {
            text-align: center;
        }
    </style>
    <link rel="stylesheet" href="js/style.css">
</head>

<body onload="alert('Terminou de carregar!')" onresize="alert('Redimensionou a tela!')">
    <!-- <body> onmousedown="alert('clicou na tela')" onmouseup="alert('soltou o clique')"> -->
    <!-- Interno -->
    <h1>Aprendendo Javascript</h1>
    <p id="texto"></p>

    <select id="ano">
        <option selected disabled>Selecione um ano</option>
    </select>

    <button ondblclick="eventoDblClick()">Clique aqui</button><br><br>

    <input style="padding: 50px; font-size: 40px;" type="text" id="dia" placeholder="Digite alguma coisa: ">
    <br><br>
    <button style="padding: 50px;" onclick="diaDaSemana()">Verificar</button>
    <br><br>
    <select id="itens" onchange="eventoOnChange()">
        <option value="1">Item 1</option>
        <option value="2">Item 2</option>
        <option value="3">Item 3</option>
    </select>

    <br><br>

    <div id="quadrado" style="margin: auto auto; width: 80%; height: 200px; background: blue;">
        <!-- onmouseover="eventoMouseOver()" onmouseout="eventoMouseOut()" onmousemove="eventoMouseMove()"> -->
    </div>

    <br>

    <input id="cadastro" style="padding: 80px; font-size: 40px;" type="text" placeholder="Digite seu nome" value="João"
        onfocus="eventoOnFocus()" onblur="eventoOnBlur()" onkeypress="eventoOnKeyPress()" onkeydown="eventoOnKeyDown()"
        onkeyup="eventoOnKeyUp()">
    <p>
        <script>
            document.write('Oi escrito com document write');
        </script>
    </p>

    <h2>Controle de Tempo</h2>
    <h2 id="tempo">10</h2>
    <button class="start" onclick="ativarContagem()">Iniciar</button>
    <button class="stop" onclick="pararContagem()">Parar</button>

    <script src="js/index.js"></script>
</body>

</html>
